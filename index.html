<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Freedom Finance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f3f4f6; }
.sidebar {
  height:100vh; width:230px; position:fixed;
  background:#111827; color:white; padding-top:20px;
}
.sidebar h2 { text-align:center; }
.sidebar a {
  display:block; padding:12px; color:#d1d5db;
  text-decoration:none; cursor:pointer;
}
.sidebar a:hover { background:#374151; color:white; }
.content { margin-left:250px; padding:20px; }

.card {
  background:white; padding:15px; margin:10px;
  border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);
  display:inline-block; width:220px;
}

input, select, button { padding:6px; margin:4px; }
button {
  background:#2563eb; color:white; border:none;
  border-radius:5px; cursor:pointer;
}
button:hover { background:#1d4ed8; }

table {
  width:100%; margin-top:15px; background:white;
  border-collapse:collapse;
}
th, td { padding:8px; border-bottom:1px solid #ddd; }

.hidden { display:none; }
canvas { background:white; margin-top:20px; padding:10px; border-radius:10px; }
</style>
</head>

<body>

<div class="sidebar">
<h2>Freedom</h2>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('fluxo')">Fluxo de Caixa</a>
</div>

<div class="content">

<div id="dashboard" class="section">
<h1>Dashboard</h1>

<div class="card">Receitas<br><strong>R$ <span id="totalReceitas">0</span></strong></div>
<div class="card">Despesas<br><strong>R$ <span id="totalDespesas">0</span></strong></div>
<div class="card">Saldo<br><strong>R$ <span id="saldo">0</span></strong></div>

<canvas id="graficoResumo"></canvas>
<canvas id="graficoCategorias"></canvas>

</div>

<div id="fluxo" class="section hidden">
<h1>Fluxo de Caixa</h1>

<label>Mês:</label>
<input type="month" id="mesFiltro">

<h3>Nova Receita</h3>
<input type="number" id="valorReceita" placeholder="Valor">
<select id="categoriaReceita">
<option>Salário</option>
<option>Dividendos</option>
<option>Rendimentos</option>
<option>Recebimento PF</option>
</select>
<button onclick="addTransacao('receita')">Adicionar</button>

<h3>Nova Despesa</h3>
<input type="number" id="valorDespesa" placeholder="Valor">
<select id="categoriaDespesa">
<option>Moradia</option>
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Saúde</option>
<option>Educação</option>
</select>
<button onclick="addTransacao('despesa')">Adicionar</button>

<table>
<thead>
<tr>
<th>Tipo</th>
<th>Categoria</th>
<th>Valor</th>
<th>Mês</th>
</tr>
</thead>
<tbody id="tabelaFluxo"></tbody>
</table>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("financeData")) || [];

function save() {
  localStorage.setItem("financeData", JSON.stringify(data));
  atualizar();
}

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function addTransacao(tipo){
  const mes = document.getElementById("mesFiltro").value;
  const valor = parseFloat(
    tipo==="receita" ? 
    document.getElementById("valorReceita").value :
    document.getElementById("valorDespesa").value
  );

  const categoria = tipo==="receita" ?
    document.getElementById("categoriaReceita").value :
    document.getElementById("categoriaDespesa").value;

  if(!mes || isNaN(valor)) return;

  data.push({tipo, categoria, valor, mes});
  save();
}

function atualizar(){
  const mes = document.getElementById("mesFiltro").value;
  const filtrado = data.filter(t => t.mes === mes);

  let receitas = 0;
  let despesas = 0;
  let categorias = {};

  let tabela="";
  filtrado.forEach(t=>{
    tabela += `<tr>
      <td>${t.tipo}</td>
      <td>${t.categoria}</td>
      <td>${t.tipo==='despesa' ? '- ' : ''}R$ ${t.valor}</td>
      <td>${t.mes}</td>
    </tr>`;

    if(t.tipo==="receita") receitas+=t.valor;
    else despesas+=t.valor;

    if(!categorias[t.categoria]) categorias[t.categoria]=0;
    categorias[t.categoria]+=t.valor;
  });

  document.getElementById("tabelaFluxo").innerHTML=tabela;
  document.getElementById("totalReceitas").innerText=receitas.toFixed(2);
  document.getElementById("totalDespesas").innerText=despesas.toFixed(2);
  document.getElementById("saldo").innerText=(receitas-despesas).toFixed(2);

  criarGraficos(receitas,despesas,categorias);
}

let graficoResumo;
let graficoCategorias;

function criarGraficos(receitas,despesas,categorias){
  if(graficoResumo) graficoResumo.destroy();
  if(graficoCategorias) graficoCategorias.destroy();

  graficoResumo = new Chart(document.getElementById("graficoResumo"),{
    type:'bar',
    data:{
      labels:['Receitas','Despesas'],
      datasets:[{data:[receitas,despesas]}]
    }
  });

  graficoCategorias = new Chart(document.getElementById("graficoCategorias"),{
    type:'pie',
    data:{
      labels:Object.keys(categorias),
      datasets:[{data:Object.values(categorias)}]
    }
  });
}

document.getElementById("mesFiltro").addEventListener("change", atualizar);
</script>

</body>
</html>
