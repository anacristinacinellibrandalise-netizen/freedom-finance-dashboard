      display: inline-block;
      width: 200px;
      text-align: center;
    }
    h1 {
      text-align: center;
    }
  </style>
</head>
<body>

<h1>Freedom Finance Dashboard</h1>

<div class="card">
  <h3>Patrimônio Total</h3>
  <p>R$ 0,00</p>
</div>

<div class="card">

</div>

<div class="card">
  <h3>Despesa do Mês</h3>

</div>

<div class="card">

</html>
